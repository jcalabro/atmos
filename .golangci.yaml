version: "2"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  enable:
    - bodyclose
    - durationcheck
    - errorlint
    - fatcontext
    - misspell
    - musttag
    - nakedret
    - nilerr
    - noctx
    - paralleltest
    - unconvert
    - wastedassign
  settings:
    errcheck:
      check-type-assertions: true
    gocritic:
      enable-all: true
    paralleltest:
      ignore-missing-subtests: true
  exclusions:
    rules:
      - path: ^streaming/example_test\.go$
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      rewrite-rules:
        - pattern: 'interface{}'
          replacement: 'any'
