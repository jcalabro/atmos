<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AT Protocol WASM Demo</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 2rem; }
    h1, h2 { color: #0984e3; }
    .result { background: #16213e; padding: 1rem; margin: 0.5rem 0; border-radius: 4px; }
    .ok { border-left: 3px solid #00b894; }
    .err { border-left: 3px solid #d63031; }
    #log { white-space: pre-wrap; }

    #firehose { margin-bottom: 2rem; }
    #firehose-controls { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; flex-wrap: wrap; }
    #firehose-controls button {
      font-family: monospace; padding: 0.4rem 1rem; cursor: pointer;
      background: #0984e3; color: white; border: none; border-radius: 4px;
    }
    #firehose-controls button:disabled { background: #555; cursor: default; }
    #firehose-controls button.stop { background: #d63031; }
    #source-select {
      font-family: monospace; padding: 0.4rem 0.6rem; cursor: pointer;
      background: #16213e; color: #e0e0e0; border: 1px solid #555; border-radius: 4px;
      font-size: 0.9rem;
    }
    #source-select:disabled { color: #888; cursor: default; }
    #firehose-stats { color: #888; }
    #source-info { color: #666; font-size: 0.8rem; margin-bottom: 0.5rem; }
    #firehose-log {
      height: 400px; overflow-y: auto; background: #0d1117; border-radius: 4px;
      padding: 0.5rem; font-size: 0.85rem; line-height: 1.4;
    }
    .evt { padding: 2px 4px; border-bottom: 1px solid #1a1a2e; }
    .evt-create { color: #00b894; }
    .evt-update { color: #fdcb6e; }
    .evt-delete { color: #d63031; }
    .evt-did { color: #888; }
    .evt-collection { color: #74b9ff; }
    .evt-text { color: #dfe6e9; }
  </style>
</head>
<body>
  <h1>AT Protocol WASM Demo</h1>

  <div id="firehose">
    <h2>Live Event Stream</h2>
    <div id="firehose-controls">
      <select id="source-select">
        <option value="wss://jetstream1.us-east.bsky.network/subscribe">Jetstream</option>
        <option value="wss://bsky.network/xrpc/com.atproto.sync.subscribeRepos">Firehose</option>
      </select>
      <button id="btn-start">Start</button>
      <button id="btn-stop" disabled class="stop">Stop</button>
      <button id="btn-clear">Clear</button>
      <span id="firehose-stats"></span>
    </div>
    <div id="source-info">Jetstream: lightweight JSON events with record text previews</div>
    <div id="firehose-log"></div>
  </div>

  <h2>Tests</h2>
  <div id="log"></div>

  <script src="wasm_exec.js"></script>
  <script type="module">
    const log = document.getElementById('log');
    function emit(label, value, ok = true) {
      const div = document.createElement('div');
      div.className = `result ${ok ? 'ok' : 'err'}`;
      div.textContent = `${label}: ${typeof value === 'object' ? JSON.stringify(value, null, 2) : value}`;
      log.appendChild(div);
    }

    async function run() {
      emit('Status', 'Loading WASM...');

      const go = new Go();
      const resp = await fetch('./atmos.wasm.gz');
      const decompressed = new Response(
        resp.body.pipeThrough(new DecompressionStream('gzip')),
        { headers: { 'Content-Type': 'application/wasm' } },
      );
      const result = await WebAssembly.instantiateStreaming(
        decompressed,
        go.importObject,
      );
      go.run(result.instance);

      const atmos = globalThis.atmos;
      if (!atmos) {
        emit('Error', 'atmos global not found', false);
        return;
      }
      emit('Status', 'WASM loaded');

      // Syntax tests
      try {
        const did = atmos.parseDID('did:plc:ewvi7nxzyoun6zhxrhs64oiz');
        emit('parseDID', did);
      } catch (e) { emit('parseDID', e.message, false); }

      try {
        const handle = atmos.parseHandle('atproto.com');
        emit('parseHandle', handle);
      } catch (e) { emit('parseHandle', e.message, false); }

      try {
        const uri = atmos.parseATURI('at://did:plc:ewvi7nxzyoun6zhxrhs64oiz/app.bsky.feed.post/abc123');
        emit('parseATURI', uri);
      } catch (e) { emit('parseATURI', e.message, false); }

      try {
        const nsid = atmos.parseNSID('app.bsky.feed.post');
        emit('parseNSID', nsid);
      } catch (e) { emit('parseNSID', e.message, false); }

      try {
        const tid = atmos.generateTID();
        emit('generateTID', tid);
      } catch (e) { emit('generateTID', e.message, false); }

      // CBOR tests
      try {
        const encoded = atmos.cbor.encode({text: 'hello', num: 42});
        emit('cbor.encode', `${encoded.length} bytes`);

        const decoded = atmos.cbor.decode(encoded);
        emit('cbor.decode', decoded);

        const cid = atmos.cbor.computeCID(encoded);
        emit('cbor.computeCID', cid);
      } catch (e) { emit('cbor', e.message, false); }

      // Crypto tests
      try {
        const p256 = atmos.crypto.generateP256();
        emit('crypto.generateP256', { didKey: p256.didKey, pubLen: p256.publicKey.length });

        const msg = new TextEncoder().encode('hello world');
        const sig = atmos.crypto.sign(p256.privateKey, msg);
        emit('crypto.sign', `${sig.length} byte signature`);

        const valid = atmos.crypto.verify(p256.publicKey, msg, sig);
        emit('crypto.verify', valid);

        const parsed = atmos.crypto.parseDIDKey(p256.didKey);
        emit('crypto.parseDIDKey', { type: parsed.type, pubLen: parsed.publicKey.length });
      } catch (e) { emit('crypto', e.message, false); }

      // K-256
      try {
        const k256 = atmos.crypto.generateK256();
        emit('crypto.generateK256', { didKey: k256.didKey, pubLen: k256.publicKey.length });
      } catch (e) { emit('crypto.generateK256', e.message, false); }

      // OAuth tests
      try {
        const pkce = atmos.oauth.generatePKCE();
        emit('oauth.generatePKCE', pkce);
      } catch (e) { emit('oauth', e.message, false); }

      // Identity resolution (async, needs network)
      try {
        emit('Status', 'Resolving identity...');
        const ident = await atmos.identity.resolve('barackobama.bsky.social');
        emit('identity.resolve', ident);
      } catch (e) { emit('identity.resolve', e.message, false); }

      emit('Status', 'All tests complete');

      // --- Jetstream firehose ---
      setupFirehose(atmos);
    }

    const sourceDescriptions = {
      'wss://jetstream1.us-east.bsky.network/subscribe':
        'Jetstream: lightweight JSON events with record text previews',
      'wss://bsky.network/xrpc/com.atproto.sync.subscribeRepos':
        'Firehose: full-fidelity CBOR frames with CAR blocks, high volume',
    };

    function setupFirehose(atmos) {
      const sourceSelect = document.getElementById('source-select');
      const sourceInfo = document.getElementById('source-info');
      const btnStart = document.getElementById('btn-start');
      const btnStop = document.getElementById('btn-stop');
      const btnClear = document.getElementById('btn-clear');
      const stats = document.getElementById('firehose-stats');
      const firehoseLog = document.getElementById('firehose-log');

      const MAX_ROWS = 200;
      let source = null;
      let count = 0;
      let startTime = 0;

      sourceSelect.addEventListener('change', () => {
        sourceInfo.textContent = sourceDescriptions[sourceSelect.value] || '';
      });

      function updateStats() {
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        const rate = (count / (Date.now() - startTime) * 1000).toFixed(1);
        stats.textContent = `${count} events | ${elapsed}s | ${rate} evt/s`;
      }

      function makeSpan(className, text) {
        const span = document.createElement('span');
        span.className = className;
        span.textContent = text;
        return span;
      }

      function addEvent(evt) {
        count++;
        if (count % 50 === 0) updateStats();

        const row = document.createElement('div');
        row.className = `evt evt-${evt.operation}`;

        const op = evt.operation.padEnd(6);
        const col = evt.collection.split('.').pop();
        const did = evt.did.slice(0, 24) + '...';

        row.append(
          makeSpan(`evt-${evt.operation}`, op),
          ' ',
          makeSpan('evt-collection', col),
          ' ',
          makeSpan('evt-did', did),
        );

        if (evt.record) {
          try {
            const rec = JSON.parse(evt.record);
            let text = rec.text || rec.subject?.uri || rec.subject || '';
            if (typeof text === 'object') text = JSON.stringify(text);
            if (text.length > 80) text = text.slice(0, 80) + '...';
            if (text) {
              row.append(' ', makeSpan('evt-text', text));
            }
          } catch {}
        }

        firehoseLog.prepend(row);

        // Trim old rows.
        while (firehoseLog.children.length > MAX_ROWS) {
          firehoseLog.lastChild.remove();
        }
      }

      btnStart.addEventListener('click', () => {
        if (source) return;

        const url = sourceSelect.value;
        sourceSelect.disabled = true;

        count = 0;
        startTime = Date.now();
        firehoseLog.replaceChildren();
        stats.textContent = 'Connecting...';

        source = atmos.firehose.connect(url);
        source.onEvent(addEvent);

        btnStart.disabled = true;
        btnStop.disabled = false;
        stats.textContent = 'Connected, waiting for events...';
      });

      btnStop.addEventListener('click', () => {
        if (!source) return;
        source.close();
        source = null;
        sourceSelect.disabled = false;
        btnStart.disabled = false;
        btnStop.disabled = true;
        updateStats();
        stats.textContent += ' (stopped)';
      });

      btnClear.addEventListener('click', () => {
        firehoseLog.replaceChildren();
        count = 0;
        startTime = Date.now();
        stats.textContent = '';
      });
    }

    run().catch(e => emit('Fatal', e.message, false));
  </script>
</body>
</html>
