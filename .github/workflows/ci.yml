# CI for atmos.
#
# Security posture
# ----------------
# This workflow is hardened against the standard GitHub Actions footguns.
# Every choice below is deliberate; please read the rationale before relaxing
# any of these settings.
#
#   1. Every third-party action is pinned to a full 40-character commit SHA,
#      not a mutable tag. Tags can be force-pushed (cf. the tj-actions/
#      changed-files compromise of March 2025); commit SHAs cannot. We bump
#      these by hand on a periodic cadence — Dependabot is intentionally not
#      used, since it runs as a privileged actor and has its own history of
#      supply-chain incidents. Manual review is cheap at this footprint.
#
#   2. The workflow-level `permissions:` block grants nothing. Each job adds
#      only the scopes it needs (least privilege).
#
#   3. `actions/checkout` runs with `persist-credentials: false` so the token
#      isn't left in `.git/config` for subsequent steps to read. We're not
#      pushing from CI, so we don't need it.
#
#   4. `step-security/harden-runner` blocks all egress except an explicit
#      allowlist. This neuters a compromised dependency's ability to
#      exfiltrate secrets or source. Widen the allowlist in a reviewed PR
#      if a future change adds a new legitimate egress target.
#
#   5. We use `push` only. Only users with write access can push refs, so CI
#      never executes code from an untrusted source. We explicitly do NOT use
#      `pull_request` (runs untrusted PR code) or `pull_request_target` (runs
#      untrusted PR code WITH secrets — the canonical Actions pwn vector).
#
#   6. `GOTOOLCHAIN=local` pins us to the Go version setup-go installs. Go's
#      auto-toolchain feature would otherwise silently download and run a
#      different version if `go.mod` declared something newer.
#
#   7. The runner image is pinned to a specific Ubuntu version, not
#      `ubuntu-latest`, so a Microsoft-side image roll can't change build
#      behavior under us.
#
#   8. Each job has a `timeout-minutes` cap so a hung test or wedged dep
#      fetch can't hold a runner indefinitely.
#
#   9. The concurrency group cancels superseded runs on feature branches but
#      deliberately does NOT cancel runs on `main`, where every commit's
#      signal is independently valuable for `git bisect`.
#
#  10. We never interpolate untrusted event payload fields (PR titles, commit
#      messages, branch names) into `run:` shell strings. That is the
#      canonical Actions script-injection vector.
#
#  11. All caching is disabled. The Actions cache is shared mutable state
#      with default-branch fallback restore semantics; a compromised actor
#      with write access to any branch could plant artifacts that future
#      runs (including on `main`) would restore and execute. We pay a few
#      seconds per run for `go mod download` in exchange for no persistent
#      foothold for an attacker.

name: ci

on:
  push:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Defeat the Go auto-toolchain so `go test` cannot silently download and
  # execute a different toolchain than the one setup-go installed.
  GOTOOLCHAIN: local

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: block
          # Endpoints required by checkout + setup-go + setup-just + the
          # `go install` calls in `just install-tools`.
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            raw.githubusercontent.com:443
            proxy.golang.org:443
            sum.golang.org:443
            storage.googleapis.com:443
            dl.google.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install tooling
        run: just install-tools

      - name: Lint
        run: just lint

  test:
    name: test (race)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            raw.githubusercontent.com:443
            proxy.golang.org:443
            sum.golang.org:443
            storage.googleapis.com:443
            dl.google.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install tooling
        run: just install-tools

      - name: Test (race detector)
        run: just test-race

  test-wasm:
    name: test (wasm)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: block
          # Same Go/GitHub endpoints as the other jobs, plus nodejs.org for
          # setup-node's distribution download.
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            raw.githubusercontent.com:443
            proxy.golang.org:443
            sum.golang.org:443
            storage.googleapis.com:443
            dl.google.com:443
            nodejs.org:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Test (wasm)
        run: just test-wasm
